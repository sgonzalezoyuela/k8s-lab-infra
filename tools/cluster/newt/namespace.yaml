apiVersion: v1
kind: Namespace
metadata:
  name: newt
  labels:
    app.kubernetes.io/name: newt
    # newt is fully userspace — no host network, no privileged caps, no host
    # paths. The restricted Pod Security Admission profile is a perfect fit.
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
